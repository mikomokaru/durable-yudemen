<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- PWA standalone（ホーム画面追加で Safari クロムを消す）。status-bar-style: black-translucent で
         コンテンツをステータスバー裏まで伸ばし、ほぼ全画面にする（safe-area-inset で被りを回避）。 -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BoilIt" />
    <title>BoilIt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Manrope:wght@500;600;700;800&family=Source+Code+Pro:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      /* プルトゥリフレッシュ（pull-to-refresh）による意図しない再読み込みを抑止する。
         リロード抑止の手段は manifest の standalone 表示と overscroll-behavior の二点に限定し、
         beforeunload や JS によるリロード傍受などの追加抑止層は設けない（決定 A・要件10.5）。 */
      html,
      body {
        overscroll-behavior: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/client/main.tsx"></script>
  </body>
</html>
