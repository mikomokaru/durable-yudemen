<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="BoilIt">
  <!-- BoilIt アプリアイコン：角丸ダーク背景に、俯瞰した鍋（琥珀のリング）と麺の三点。
       配色は @theme のブランド金（color-brand ≒ #e4ba76）とダーク面に対応。 -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#26221a"/>
      <stop offset="1" stop-color="#14120d"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <!-- 鍋のリング（太リング）。 -->
  <circle cx="512" cy="512" r="328" fill="none" stroke="#e4ba76" stroke-width="62"/>
  <!-- 麺の三点（茹で加減の三点モチーフ）。中央やや下に浮かべる。中心の一点は淡色。 -->
  <circle cx="440" cy="612" r="50" fill="#e4ba76"/>
  <circle cx="600" cy="588" r="46" fill="#e4ba76"/>
  <circle cx="520" cy="654" r="36" fill="#f0d9a8"/>
</svg>
